x-backend-app-environment: &backend-app-environment
  DATABASE_URL: "postgresql+psycopg://${POSTGRES_APP_USER:?missing}:${POSTGRES_APP_PASSWORD:?missing}@postgres:5432/${POSTGRES_DB:?missing}"
  REDIS_URL: "redis://redis:6379/0"
  RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER:?missing}:${RABBITMQ_DEFAULT_PASS:?missing}@rabbitmq:5672/"
  QDRANT_URL: "http://qdrant:6333"
  APP_ENV: "${APP_ENV:?missing}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  JWT_SECRET_KEY: "${JWT_SECRET_KEY:?missing}"
  TOKEN_ENCRYPTION_KEY: "${TOKEN_ENCRYPTION_KEY:?missing}"
  CORS_ORIGINS: "${CORS_ORIGINS:?missing}"
  LLM_MODE: "${LLM_MODE:-mock}"
  LLM_PROVIDER: "${LLM_PROVIDER:-gemini}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_API_BASE_URL: "${OPENAI_API_BASE_URL:-}"
  OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
  OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}"
  GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
  GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
  GEMINI_EMBEDDING_MODEL: "${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}"
  DEFAULT_MODEL_VERSION: "${DEFAULT_MODEL_VERSION:-gpt-4o-mini}"
  DEFAULT_PROMPT_VERSION: "${DEFAULT_PROMPT_VERSION:-trust-layer-v1}"
  DEFAULT_POLICY_VERSION: "${DEFAULT_POLICY_VERSION:-trust-layer-v1}"
  WEBHOOK_SIGNATURE_BYPASS: "${WEBHOOK_SIGNATURE_BYPASS:-false}"
  PUBLIC_API_BASE_URL: "${PUBLIC_API_BASE_URL:?missing}"
  FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:?missing}"
  WEBHOOK_INTERNAL_SECRET: "${WEBHOOK_INTERNAL_SECRET:?missing}"
  OAUTH_STATE_SECRET: "${OAUTH_STATE_SECRET:?missing}"
  META_APP_ID: "${META_APP_ID:-}"
  META_APP_SECRET: "${META_APP_SECRET:-}"
  META_GRAPH_API_VERSION: "${META_GRAPH_API_VERSION:-v20.0}"
  META_GRAPH_API_BASE_URL: "${META_GRAPH_API_BASE_URL:-https://graph.facebook.com}"
  ENABLED_CHANNEL_PROVIDERS: "${ENABLED_CHANNEL_PROVIDERS:-instagram,whatsapp,telegram,bale,rubika}"
  ENABLE_REAL_PROVIDER_SEND: "${ENABLE_REAL_PROVIDER_SEND:-false}"
  RABBITMQ_QUEUE_MESSAGE_RECEIVED: "${RABBITMQ_QUEUE_MESSAGE_RECEIVED:-channel.message.received}"
  RABBITMQ_QUEUE_RETRY: "${RABBITMQ_QUEUE_RETRY:-channel.message.received.retry}"
  RABBITMQ_QUEUE_DLQ: "${RABBITMQ_QUEUE_DLQ:-channel.message.received.dlq}"
  CONVERSATION_LOCK_TTL_SECONDS: "${CONVERSATION_LOCK_TTL_SECONDS:-120}"
  RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
  TRUSTED_PROXY_CIDRS: "${TRUSTED_PROXY_CIDRS:-[]}"
  RATE_LIMIT_LOGIN_PER_MINUTE: "${RATE_LIMIT_LOGIN_PER_MINUTE:-5}"
  RATE_LIMIT_WEBHOOK_PER_MINUTE: "${RATE_LIMIT_WEBHOOK_PER_MINUTE:-120}"
  RATE_LIMIT_OUTBOUND_MESSAGE_PER_MINUTE: "${RATE_LIMIT_OUTBOUND_MESSAGE_PER_MINUTE:-30}"
  RABBITMQ_MAX_RETRIES: "${RABBITMQ_MAX_RETRIES:-3}"
  RABBITMQ_RETRY_DELAY_MS: "${RABBITMQ_RETRY_DELAY_MS:-30000}"
  BACKGROUND_JOB_INTERVAL_SECONDS: "${BACKGROUND_JOB_INTERVAL_SECONDS:-60}"
  EMBEDDING_REFRESH_BATCH_SIZE: "${EMBEDDING_REFRESH_BATCH_SIZE:-50}"
  DEFAULT_ADMIN_EMAIL: "${DEFAULT_ADMIN_EMAIL:?missing}"
  DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD:?missing}"
  DEFAULT_ADMIN_NAME: "${DEFAULT_ADMIN_NAME:-Platform Admin}"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

services:
  backend-migrate:
    build:
      context: ./backend
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    environment:
      <<: *backend-app-environment
    networks:
      - private
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro

  backend:
    build:
      context: ./backend
    command:
      [
        "sh",
        "-c",
        'if [ "$${ENABLE_ENSURE_ADMIN:-true}" = "true" ]; then python -m app.scripts.ensure_admin; fi && exec uvicorn app.main:app --host 0.0.0.0 --port 8000',
      ]
    restart: unless-stopped
    environment:
      <<: *backend-app-environment
      ENABLE_ENSURE_ADMIN: "${ENABLE_ENSURE_ADMIN:-true}"
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_HOST_PORT:-8000}:8000"
    networks:
      - public
      - private
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.main"]
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_APP_USER:?missing}:${POSTGRES_APP_PASSWORD:?missing}@postgres:5432/${POSTGRES_DB:?missing}"
      REDIS_URL: "redis://redis:6379/0"
      RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER:?missing}:${RABBITMQ_DEFAULT_PASS:?missing}@rabbitmq:5672/"
      QDRANT_URL: "http://qdrant:6333"
      APP_ENV: "${APP_ENV:?missing}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?missing}"
      TOKEN_ENCRYPTION_KEY: "${TOKEN_ENCRYPTION_KEY:?missing}"
      CONVERSATION_LOCK_TTL_SECONDS: "${CONVERSATION_LOCK_TTL_SECONDS:-120}"
      RABBITMQ_QUEUE_MESSAGE_RECEIVED: "${RABBITMQ_QUEUE_MESSAGE_RECEIVED:-channel.message.received}"
      RABBITMQ_QUEUE_RETRY: "${RABBITMQ_QUEUE_RETRY:-channel.message.received.retry}"
      RABBITMQ_QUEUE_DLQ: "${RABBITMQ_QUEUE_DLQ:-channel.message.received.dlq}"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    networks:
      - private
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    volumes:
      - ./backend/app:/app/app:ro

  scheduler:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.scheduler"]
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_APP_USER:?missing}:${POSTGRES_APP_PASSWORD:?missing}@postgres:5432/${POSTGRES_DB:?missing}"
      REDIS_URL: "redis://redis:6379/0"
      RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER:?missing}:${RABBITMQ_DEFAULT_PASS:?missing}@rabbitmq:5672/"
      QDRANT_URL: "http://qdrant:6333"
      APP_ENV: "${APP_ENV:?missing}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?missing}"
      TOKEN_ENCRYPTION_KEY: "${TOKEN_ENCRYPTION_KEY:?missing}"
      BACKGROUND_JOB_INTERVAL_SECONDS: "${BACKGROUND_JOB_INTERVAL_SECONDS:-60}"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    networks:
      - private
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    volumes:
      - ./backend/app:/app/app:ro

  frontend:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:?missing}"
      VITE_LANDING_URL: "${VITE_LANDING_URL:?missing}"
    ports:
      - "${FRONTEND_BIND_IP:-127.0.0.1}:${FRONTEND_HOST_PORT:-5173}:5173"
    networks:
      - public
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  landing:
    build:
      context: ./landing
      target: development
    restart: unless-stopped
    environment:
      LANDING_PORT: "${LANDING_PORT:-5174}"
      VITE_FRONTEND_URL: "${VITE_FRONTEND_URL:?missing}"
    ports:
      - "${LANDING_BIND_IP:-127.0.0.1}:${LANDING_HOST_PORT:-5174}:${LANDING_PORT:-5174}"
    networks:
      - public
    depends_on:
      frontend:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./landing:/app
      - landing_node_modules:/app/node_modules

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?missing}"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_SUPERUSER_PASSWORD:?missing}"
      POSTGRES_APP_USER: "${POSTGRES_APP_USER:?missing}"
      POSTGRES_APP_PASSWORD: "${POSTGRES_APP_PASSWORD:?missing}"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    networks:
      - private
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-app-user.sh:/docker-entrypoint-initdb.d/001-init-app-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m

  redis:
    image: redis:8.8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--protected-mode", "no"]
    networks:
      - private
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER:?missing}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS:?missing}"
      RABBITMQ_DEFAULT_VHOST: "/"
    networks:
      - private
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  qdrant:
    image: qdrant/qdrant:v1.18
    restart: unless-stopped
    networks:
      - private
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m

networks:
  public:
    driver: bridge
  private:
    driver: bridge
    internal: true

volumes:
  frontend_node_modules:
  landing_node_modules:
  postgres_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:

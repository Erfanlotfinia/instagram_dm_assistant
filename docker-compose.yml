services:
  backend:
    build:
      context: ./backend
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/instagram_dm_assistant}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-local-development}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-local-dev-token-encryption-key-32b!}
      INSTAGRAM_WEBHOOK_VERIFY_TOKEN: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN:-local-instagram-verify-token}
      ENABLE_REAL_INSTAGRAM_SEND: ${ENABLE_REAL_INSTAGRAM_SEND:-false}
      CONVERSATION_LOCK_TTL_SECONDS: ${CONVERSATION_LOCK_TTL_SECONDS:-120}
    ports:
      - "${BACKEND_HOST_PORT:-8800}:8000"
    networks:
      - public
      - private
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini
      - ./.env:/app/.env:ro

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.main"]
    environment:
      # Environment variables remain identical
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/instagram_dm_assistant}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CONVERSATION_LOCK_TTL_SECONDS: ${CONVERSATION_LOCK_TTL_SECONDS:-120}
    networks:
      - private
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./.env:/app/.env:ro

  scheduler:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.scheduler"]
    environment:
      # Environment variables remain identical
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/instagram_dm_assistant}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKGROUND_JOB_INTERVAL_SECONDS: ${BACKGROUND_JOB_INTERVAL_SECONDS:-60}
    networks:
      - private
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./.env:/app/.env:ro

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8800}
    ports:
      - "5173:5173"
    networks:
      - public
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: instagram_dm_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - private
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instagram_dm_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - private
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - private
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - private
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  public:
    driver: bridge
  private:
    driver: bridge

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:
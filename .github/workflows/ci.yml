name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: instagram_dm_assistant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/instagram_dm_assistant_test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/instagram_dm_assistant_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]" || pip install -r requirements.txt
          pip install pytest
      - name: Run backend tests
        working-directory: backend
        run: pytest app/tests -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and test frontend
        working-directory: frontend
        run: |
          npm ci
          npm test -- --run

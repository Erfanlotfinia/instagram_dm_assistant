name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: modira_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d modira_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/modira_test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/modira_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      QDRANT_URL: http://localhost:6333
      RATE_LIMIT_ENABLED: "false"
      LLM_MODE: mock
      WEBHOOK_SIGNATURE_BYPASS: "true"
      JWT_SECRET_KEY: ci-test-jwt-secret-key-32-chars-min
      TOKEN_ENCRYPTION_KEY: ci-test-token-encryption-key-32b!

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      # - name: Ruff lint
      #   working-directory: backend
      #   run: ruff check app

      - name: Run migrations on clean database
        working-directory: backend
        run: bash scripts/check_migrations.sh

      - name: Run backend tests
        working-directory: backend
        run: pytest app/tests -q --tb=short

      - name: Run resolver benchmark
        working-directory: backend
        run: python -m app.scripts.run_resolver_benchmark | tee benchmark-report.json

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: resolver-benchmark-report
          path: backend/benchmark-report.json
          if-no-files-found: ignore

      - name: Run golden replay suite
        working-directory: backend
        run: python -m app.scripts.run_golden_replay_suite | tee golden-replay-report.json

      - name: Upload golden replay report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: golden-replay-report
          path: backend/golden-replay-report.json
          if-no-files-found: ignore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

  landing:
    name: Landing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install landing dependencies
        working-directory: landing
        run: npm ci

      - name: Typecheck
        working-directory: landing
        run: npm run typecheck

      - name: Build
        working-directory: landing
        run: npm run build

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Prepare compose environment
        run: cp .env.example .env

      - name: Build and smoke test
        run: bash scripts/docker_smoke_test.sh

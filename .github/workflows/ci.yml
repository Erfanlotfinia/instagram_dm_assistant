name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: modira_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    env:
      APP_ENV: test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/modira_test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/modira_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      RATE_LIMIT_ENABLED: "false"
      LLM_MODE: mock
      WEBHOOK_SIGNATURE_BYPASS: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]" || pip install -r requirements-dev.txt
          pip install pytest alembic
      - name: Run migrations on clean database
        working-directory: backend
        run: bash scripts/check_migrations.sh
      - name: Run backend tests
        working-directory: backend
        run: pytest app/tests -q --tb=short
      - name: Run resolver benchmark
        working-directory: backend
        run: python -m app.scripts.run_resolver_benchmark | tee benchmark-report.json
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: resolver-benchmark-report
          path: backend/benchmark-report.json
      - name: Run golden replay suite
        working-directory: backend
        run: python -m app.scripts.run_golden_replay_suite | tee golden-replay-report.json
      - name: Upload golden replay report
        uses: actions/upload-artifact@v4
        with:
          name: golden-replay-report
          path: backend/golden-replay-report.json

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm test -- --run
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose config
      - name: Build and smoke test
        run: bash scripts/docker_smoke_test.sh

name: CD

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Override in repo Settings → Variables → GHCR_IMAGE_PREFIX (e.g. ghcr.io/modira)
  IMAGE_PREFIX: ${{ vars.GHCR_IMAGE_PREFIX || format('ghcr.io/{0}', github.repository_owner) }}

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/soc-os-api
            ${{ env.IMAGE_PREFIX }}/soc-os-worker
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.event_name != 'pull_request'
    steps:
      - name: Print image references
        run: |
          echo "Backend image digest: ${{ needs.build-backend.outputs.image-digest }}"
          echo "API image: ${{ env.IMAGE_PREFIX }}/soc-os-api"
          echo "Worker image: ${{ env.IMAGE_PREFIX }}/soc-os-worker"
          echo ""
          echo "Update Kubernetes manifests or set GHCR_IMAGE_PREFIX if your cluster uses a different registry owner."

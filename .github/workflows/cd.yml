name: CD

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Override in repo Settings → Variables → GHCR_IMAGE_PREFIX (e.g. ghcr.io/modira)
  IMAGE_PREFIX: ${{ vars.GHCR_IMAGE_PREFIX || format('ghcr.io/{0}', github.repository_owner) }}

jobs:
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/soc-os-api
            ${{ env.IMAGE_PREFIX }}/soc-os-worker
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/soc-os-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_LANDING_URL=${{ vars.VITE_LANDING_URL }}
            VITE_PUBLIC_API_BASE_URL=${{ vars.VITE_PUBLIC_API_BASE_URL || vars.VITE_API_BASE_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-landing:
    name: Build landing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/soc-os-landing
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: landing/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_FRONTEND_URL=${{ vars.VITE_FRONTEND_URL }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  deploy-summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-landing]
    if: github.event_name != 'pull_request'
    steps:
      - name: Print image references
        run: |
          echo "Backend digest:  ${{ needs.build-backend.outputs.digest }}"
          echo "Frontend digest: ${{ needs.build-frontend.outputs.digest }}"
          echo "Landing digest:  ${{ needs.build-landing.outputs.digest }}"
          echo ""
          echo "API image:      ${{ env.IMAGE_PREFIX }}/soc-os-api"
          echo "Worker image:   ${{ env.IMAGE_PREFIX }}/soc-os-worker"
          echo "Frontend image: ${{ env.IMAGE_PREFIX }}/soc-os-frontend"
          echo "Landing image:  ${{ env.IMAGE_PREFIX }}/soc-os-landing"
          echo ""
          echo "Set GHCR_IMAGE_PREFIX if your cluster uses a different registry owner."
          echo "Set VITE_API_BASE_URL, VITE_LANDING_URL, and VITE_FRONTEND_URL repo variables for production build-time URLs."

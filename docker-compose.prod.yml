# Production overlay for Docker Compose.
# Use with the base file: docker compose -f docker-compose.yml -f docker-compose.prod.yml ...
#
# Local development keeps using docker-compose.yml alone (Vite dev servers, bind mounts,
# optional ensure_admin bootstrap). This overlay removes bind mounts, runs migrations in a
# one-shot backend-migrate service, and serves built frontend/landing assets via Nginx.

services:
  backend-migrate:
    volumes: !reset []

  backend:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      ENABLE_ENSURE_ADMIN: "${ENABLE_ENSURE_ADMIN:-false}"
    volumes: !reset []

  worker:
    volumes: !reset []

  scheduler:
    volumes: !reset []

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:?missing}"
        VITE_LANDING_URL: "${VITE_LANDING_URL:?missing}"
        VITE_PUBLIC_API_BASE_URL: "${VITE_PUBLIC_API_BASE_URL:?missing}"
    ports:
      - "${FRONTEND_BIND_IP:-127.0.0.1}:${FRONTEND_HOST_PORT:-8080}:8080"
    environment: !reset []
    volumes: !reset []

  landing:
    build:
      context: ./landing
      target: production
      args:
        VITE_FRONTEND_URL: "${VITE_FRONTEND_URL:?missing}"
    ports:
      - "${LANDING_BIND_IP:-127.0.0.1}:${LANDING_HOST_PORT:-8081}:8080"
    environment: !reset []
    volumes: !reset []
